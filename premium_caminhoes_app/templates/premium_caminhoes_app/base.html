<!DOCTYPE html>
<html lang="pt-BR">

    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Venda de Veículos e Implementos Rodoviários"/>
        <meta name="keywords" content="caminhões, carretas, veículos, usados"/>        

        {% load static %}
    
        <link rel="stylesheet" href="{% static 'premium_caminhoes_app/css/base.css' %}">
        
        {% block extra_css %}{% endblock %}

        <title>{% block title %}{% endblock %}</title>
    </head>

    <body>
        <a href="{% url 'index' %}">Premium Caminhões</a> - 
        <a href="{% url 'topics' %}">Tópicos</a>

        {% if user.is_authenticated %}
            Olá, {{ user.username }}
            <a href="{% url 'logout' %}">Sair</a>
        {% else %}
            <a href="{% url 'register' %}">Registrar</a>
            <a href="{% url 'login' %}">Entrar</a>
        {% endif %}
        
        {% block content %}{% endblock content %}
        <footer>TESTE RODAPÉ</footer>
    </body>
</html>
