{% extends "premium_caminhoes_app/base.html" %}

{% block title %}Novo Tópico{% endblock %}

{% block content %}
    <p>Adicione um novo tópico:</p>
    <form action="{% url 'new_topic' %}" method="POST">
        {% csrf_token %} <!-- Sempre na primeira linha de qualquer formulário html Django porque trás uma série de rotinas de segurança do Django para evitar ataques hackers -->
        {{ form.as_p }}
        <button name="submit">Adicionar</button>
    </form>

{% endblock content %}
